site_name: Brain
site_author: Lionel Pinheiro Duarte
site_url: https://lionelpinheiroduarte.github.io/brain/
repo_name: lionelpinheiroduarte/brain/

nav:
  - Home:
      - Index: index.en.md
  - Linux:
      - Fundamentals: linux/chapter1.md
  - Devops:
      - Terraform: ./devops/terraform.md
  - Tools:
      - Claude: tools/claude.md
theme:
  name: material
  font:
    text: Poppins
  languages: en
  palette:
    primary: white
  features:
    - search.suggest
    - search.highlight
    - navigation.tabs
    - navigation.path
    - navigation.top
    - navigation.expand
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - header.autohide
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
extra_css:
  - stylesheets/style.css
plugins:
  - search:
      lang:
        - en
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lionelpinheiroduarte
      name: github
