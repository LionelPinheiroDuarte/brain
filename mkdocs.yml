site_name: Brain
site_author: Lionel Pinheiro Duarte
site_url: https://lionelpinheiroduarte.github.io/brain/
repo_url: https://github.com/lionelpinheiroduarte/brain
repo_name: lionelpinheiroduarte/brain

nav:
    - Home: 
        - home/index.md
        - home/ranking.md
    - Data base:
        - database/index.md
        - SQL: database/sql/index.md
theme:
    name: material
    font:
        text: Poppins 
    languages: fr
    palette:
        primary: white
    features:
        - search.suggest
        - search.highlight
        - navigation.instant
        - navigation.tabs
        - navigation.path
        - navigation.top
        - toc.follow
        - toc.integrate
        - navigation.indexes
        - header.autohide
        - navigation.sections
        - content.code.copy
extra_css:
  - stylesheets/style.css
plugins:
    - search:
        lang:
            - fr
            - en
    - i18n:
        languages:
        - locale: fr
          name: Français
          build: true
          default: true
        - locale: en
          name: English
          build: true
extra:
    social:
        - icon: fontawesome/brands/github
          link: https://github.com/lionelpinheiroduarte
          name: github
