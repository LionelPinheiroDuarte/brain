site_name: Brain
site_author: Lionel Pinheiro Duarte
site_url: https://lionelpinheiroduarte.github.io/brain/
repo_url: https://github.com/lionelpinheiroduarte/brain
repo_name: lionelpinheiroduarte/brain/

nav:
    - Acceuil: 
        - home/index.fr.md
        - Notation: home/notation.fr.md
    - Base de donnée:
        - database/index.md
        - SQL: database/sql/sql.md
theme:
    name: material
    font:
        text: Poppins 
    languages: fr
    palette:
        primary: white
    features:
        - search.suggest
        - search.highlight
        - navigation.instant
        - navigation.tabs
        - navigation.path
        - navigation.top
        - toc.follow
        - toc.integrate
        - navigation.indexes
        - header.autohide
        - navigation.sections
        - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
extra_css:
  - stylesheets/style.css
plugins:
    - search:
        lang:
            - fr
            - en
    - i18n:
        languages:
        - locale: fr
          name: Français
          build: true
          default: true
        - locale: en
          name: English
          build: true
        nav:
          - Home: home/index.en.md
          - Data Base: 
            - database/index.en.md
            - SQL: database/sql.en.md
extra:
    social:
        - icon: fontawesome/brands/github
          link: https://github.com/lionelpinheiroduarte
          name: github
